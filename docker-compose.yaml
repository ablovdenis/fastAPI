services:
  postgres:
    image: postgres:17-alpine3.21
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env
    user: ${POSTGRES_USER}
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app_network
    ports:
      - '127.0.0.1:5436:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    volumes:
      - ./src:/app/src
      - images:/app/images
      - ./migrations:/app/migrations
    env_file:
      - .env
    ports:
      - '127.0.0.1:8020:8000'
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  app_network:
    name: app_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  db_data:
  images: